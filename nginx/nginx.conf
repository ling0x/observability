server {
  listen 80;
  server_name _;

  auth_basic "Observability";
  auth_basic_user_file /etc/nginx/.htpasswd;

  # Preserve host:port as sent by the browser so Grafana's CSRF / root_url checks stay aligned.
  proxy_set_header Host $http_host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header X-Forwarded-Host $http_host;

  location = / {
    return 302 /grafana/;
  }

  location = /grafana {
    return 302 /grafana/;
  }

  # Forward /grafana/... to Grafana as /grafana/... (required when GF_SERVER_SERVE_FROM_SUB_PATH=true).
  # Using proxy_pass .../ alone strips the prefix and causes a redirect loop + blank UI.
  location /grafana/ {
    proxy_pass http://grafana:3000/grafana/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }

  location = /prometheus {
    return 302 /prometheus/;
  }

  location /prometheus/ {
    proxy_pass http://prometheus:9090/;
    proxy_http_version 1.1;
  }
}

# OTLP HTTP (separate listen port; no basic auth). Published on the host as
# OTEL_PUBLIC_OTLP_PORT → container 4318.
#
# Allowlist: OTLP via host.docker.internal hits published port; nginx sees a
# Docker bridge / gateway IP (often 172.17.0.1 but can be 172.18.x, 172.20.x,
# etc. per compose network). Allow all RFC1918 so local simulation works; tighten
# to single public IPs in real deployments.
server {
  listen 4318;
  server_name _;

  client_max_body_size 32m;

  location / {
    allow 127.0.0.1;
    allow ::1;
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    deny all;

    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Connection "";

    proxy_pass http://otel-collector:4318;
  }
}
