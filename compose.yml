services:
    otel-collector:
        image: otel/opentelemetry-collector-contrib:latest
        container_name: otel-collector
        command: ['--config', '/etc/otelcol/config.yaml']
        volumes:
            - ./configs/otel-collector-config.yml:/etc/otelcol/config.yaml
        ports:
            - '127.0.0.1:4318:4318' # OTLP HTTP receiver for local apps
            - '127.0.0.1:13133:13133' # health_check extension
        networks:
            - observability
        depends_on:
            - tempo
            - loki
            - prometheus

    prometheus:
        image: prom/prometheus:latest
        container_name: prometheus
        command:
            - --config.file=/etc/prometheus/prometheus.yml
            # nginx serves Prometheus under /prometheus/ and strips the prefix upstream;
            # without external-url, Prometheus redirects to /query (breaks in the browser).
            - --web.external-url=${PROMETHEUS_EXTERNAL_URL:-http://localhost:8081/prometheus/}
            - --web.route-prefix=/
        volumes:
            - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml
        networks:
            - observability

    loki:
        image: grafana/loki:latest
        container_name: loki
        volumes:
            - ./configs/loki-config.yml:/etc/loki/local-config.yaml
        command: -config.file=/etc/loki/local-config.yaml
        networks:
            - observability

    tempo:
        image: grafana/tempo:2.7.2
        container_name: tempo
        command: ['-config.file=/etc/tempo.yaml']
        volumes:
            - ./configs/tempo.yml:/etc/tempo.yaml
            - tempo_data:/var/tempo
        networks:
            - observability

    grafana:
        image: grafana/grafana:latest
        container_name: grafana
        volumes:
            - grafana_data:/var/lib/grafana
            - ./configs/grafana/provisioning/datasources/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
        env_file:
            - .env
        depends_on:
            - prometheus
            - loki
            - tempo
        networks:
            - observability

    nginx:
        image: nginx:stable-alpine
        container_name: observability-nginx
        ports:
            - '${NGINX_HTTP_PORT:-8081}:80'
            - '${OTEL_PUBLIC_OTLP_HOST:-0.0.0.0}:${OTEL_PUBLIC_OTLP_PORT:-14318}:4318'
        volumes:
            - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
            - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
        depends_on:
            - otel-collector
            - grafana
            - prometheus
            - loki
            - tempo
        networks:
            - observability

networks:
    observability:

volumes:
    grafana_data:
    tempo_data:
