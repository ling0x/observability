receivers:
    otlp:
        protocols:
            http:
                endpoint: 0.0.0.0:4318

processors:
    batch:

exporters:
    # OTLP/HTTP to Tempo's native HTTP receiver (see tempo.yml :4318). gRPC to :4317 is easy to
    # misconfigure across collector/tempo versions; HTTP matches the app→collector path style.
    otlphttp/tempo:
        endpoint: http://tempo:4318
    prometheus:
        endpoint: 0.0.0.0:8889
    otlphttp/loki:
        endpoint: http://loki:3100/otlp

extensions:
    health_check:
        endpoint: 0.0.0.0:13133
    pprof:
        endpoint: 0.0.0.0:1777
    zpages:
        endpoint: 0.0.0.0:55679

service:
    extensions: [health_check, pprof, zpages]
    pipelines:
        traces:
            receivers: [otlp]
            processors: [batch]
            exporters: [otlphttp/tempo]
        metrics:
            receivers: [otlp]
            processors: [batch]
            exporters: [prometheus]
        logs:
            receivers: [otlp]
            processors: [batch]
            exporters: [otlphttp/loki]
