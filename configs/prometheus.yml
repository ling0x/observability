global:
    scrape_interval: 15s

scrape_configs:
    - job_name: 'prometheus'
      static_configs:
          - targets: ['localhost:9090']

    - job_name: 'otel-collector'
      static_configs:
          - targets: ['otel-collector:8889']

    # Optional: scrape another local service (e.g., node_exporter)
    # - job_name: 'node'
    #   static_configs:
    #     - targets: ['localhost:9100']
