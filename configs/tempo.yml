server:
    http_listen_port: 3200

distributor:
    receivers:
        otlp:
            protocols:
                grpc:
                    endpoint: '0.0.0.0:4317'
                http:
                    endpoint: '0.0.0.0:4318'

metrics_generator:
    ring:
        kvstore:
            store: inmemory
    processor:
        service_graphs: {}
        span_metrics: {}
        local_blocks: {}
    traces_storage:
        path: /var/tempo/generator/traces
    storage:
        path: /var/tempo/generator/wal
        remote_write: []

overrides:
    defaults:
        metrics_generator:
            processors: [service-graphs, span-metrics, local-blocks]

storage:
    trace:
        backend: local
        local:
            path: /var/tempo/blocks
        wal:
            path: /var/tempo/wal
